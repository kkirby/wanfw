# wanfw framework stack. Matches design-spec.md Appendix A for mounts and
# isolation (normative); everything else here is implementation detail.
name: wanfw

services:
  tier1:
    build:
      context: ..
      dockerfile: deploy/tier1.Dockerfile
    image: wanfw/tier1:dev
    container_name: wanfw-tier1
    networks: [wanfw_admin]
    ports:
      - "8443:8443"
    environment:
      WANFW_STATUS_SOCKET_PATH: /run/wanfw/orch-status.sock
      WANFW_TIER1STATE_DB: /data/state/tier1.sqlite3
    volumes:
      - wanfw_desired:/data/desired
      - wanfw_status:/data/status:ro
      - wanfw_staging:/data/staging
      - wanfw_rpc_status:/run/wanfw
      - wanfw_tier1state:/data/state
    security_opt: ["no-new-privileges:true"]
    cap_drop: [ALL]
    read_only: true
    tmpfs: ["/tmp"]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:8443/').then(r=>process.exit(r.status<500?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  orchestrator:
    build:
      context: ..
      dockerfile: deploy/orchestrator.Dockerfile
    image: wanfw/orchestrator:dev
    container_name: wanfw-orchestrator
    network_mode: "none"
    environment:
      # Compose always names a project's volumes `<project>_<key>` (T4.7
      # fix): this file's `name: wanfw` plus the volume keys below means
      # the volumes the proxy container actually needs to mount are
      # `wanfw_wanfw_certs`/`wanfw_wanfw_proxycfg`, not the bare
      # `wanfw_certs`/`wanfw_proxycfg` `paths.ts` defaults to.
      WANFW_CERTS_VOLUME_NAME: wanfw_wanfw_certs
      WANFW_PROXYCFG_VOLUME_NAME: wanfw_wanfw_proxycfg
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - wanfw_desired:/data/desired:ro
      - wanfw_status:/data/status
      - wanfw_staging:/data/staging:ro
      - wanfw_bundles:/data/bundles
      - wanfw_state:/data/state
      - wanfw_secrets:/data/secrets
      - wanfw_certs:/data/certs
      - wanfw_proxycfg:/data/proxycfg
      - wanfw_rpc_status:/run/wanfw/status
      - wanfw_rpc_plugin:/run/wanfw/plugin
    security_opt: ["no-new-privileges:true"]
    # T6.3: cap_drop ALL with explicit re-adds -- NOT read_only, unlike
    # tier1/pluginhost. orchestrator-entrypoint.sh (the only place this
    # container ever runs as root, see its own header comment) must edit
    # /etc/passwd and /etc/group at every start to join the host's
    # docker.sock group, whose GID is not knowable at build time; that write
    # needs a writable rootfs. Every actual data path is a named volume
    # regardless (mounted above), so read_only would buy no real isolation
    # here, just break the one thing that requires root in the first place.
    cap_drop: [ALL]
    cap_add: [SETUID, SETGID, DAC_OVERRIDE]
    healthcheck:
      test: ["CMD", "curl", "--fail", "--unix-socket", "/run/wanfw-admin/admin.sock", "http://localhost/status"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  pluginhost:
    build:
      context: ..
      dockerfile: deploy/pluginhost.Dockerfile
    image: wanfw/pluginhost:dev
    container_name: wanfw-pluginhost
    networks: [wanfw_egress]
    volumes:
      - wanfw_bundles:/data/bundles:ro
      - wanfw_rpc_plugin:/run/wanfw
    security_opt: ["no-new-privileges:true"]
    cap_drop: [ALL]
    read_only: true
    tmpfs: ["/tmp"]
    healthcheck:
      # pluginhost has no listening socket of its own (it dials out to the
      # orchestrator's plugin socket, §2.3) -- liveness is "the supervisor
      # process is still running", checked via /proc rather than pgrep
      # (not installed, and cap_drop:[ALL] + read-only rootfs is not the
      # place to add another binary just for this).
      test: ["CMD", "sh", "-c", "test -d /proc/1/fd"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

networks:
  wanfw_admin: {}
  wanfw_egress: {}

volumes:
  wanfw_desired: {}
  wanfw_status: {}
  wanfw_staging: {}
  wanfw_bundles: {}
  wanfw_state: {}
  wanfw_secrets: {}
  wanfw_certs: {}
  wanfw_proxycfg: {}
  wanfw_rpc_status: {}
  wanfw_rpc_plugin: {}
  wanfw_tier1state: {}
