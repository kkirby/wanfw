name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        # tier1's `next build` collects page data by importing lib/session-db.ts,
        # which opens its sqlite file at module load time -- same reason
        # deploy/tier1.Dockerfile sets this for its own build stage. Without it,
        # the build tries (and fails) to mkdir the real runtime path /data/state.
        run: pnpm -r build
        env:
          WANFW_TIER1STATE_DB: /tmp/build-tier1.sqlite3

      - name: Typecheck
        run: pnpm -r typecheck

      - name: Unit tests
        run: pnpm -r test

  image-build:
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - uses: actions/checkout@v4

      - name: Build framework images
        run: |
          docker compose -f deploy/docker-compose.yml build

  integration:
    runs-on: ubuntu-latest
    needs: image-build
    steps:
      - uses: actions/checkout@v4

      # run.sh brings the stack up, asserts §12.5, and tears down itself.
      - name: Run integration assertions (§12.5)
        run: bash test/integration/run.sh

      # M1 acceptance (spec §15): trusted echo invoke, tampered-bundle
      # refusal, out-of-grant rejection, wallMs timeout kill.
      - name: Run M1 plugin runtime acceptance
        run: bash test/integration/m1-plugin-runtime.sh

      # M3 acceptance (spec §15): real ACME DNS-01 flow against a local
      # Pebble CA -- wildcard issuance, renewal, TXT cleanup on all paths.
      - name: Run Pebble ACME e2e
        run: bash test/integration/pebble-e2e.sh
